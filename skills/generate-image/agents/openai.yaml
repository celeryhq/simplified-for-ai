# Codex-specific metadata for the generate-image skill.
# The core SKILL.md works across agents; this file adds Codex UI + the MCP
# connector dependency.

interface:
  display_name: "Generate Image"
  short_description: "Generate AI images from a text prompt with Simplified."
  icon_small: "../../assets/simplified-treadmark-logo.png"
  icon_large: "../../assets/simplified-logo.png"
  brand_color: "#FFAD00"   # Simplified amber (wordmark gray: #43464E)
  default_prompt: "Generate a product image of a coffee cup on a white background"

dependencies:
  tools:
    - type: mcp
      value: simplified
      description: "Simplified hosted MCP connector (image + social tools)."
      transport: http
      url: "https://apikit.simplified.com/mcp"
